<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>FRACTA - Progresso</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-[#f5f0df]">
<div class="flex min-h-screen">
    <aside class="w-64 bg-[#3d1300] text-white p-6">
        <h2 class="text-xl font-bold mb-8">FRACTA</h2>
        <nav class="space-y-2">
            <a href="../index.html" class="block p-2 hover:bg-white/10 rounded">Início</a>
            <a href="progresso.html" class="block p-2 bg-[#d2691e] rounded">Progresso</a>
            <a href="conquistas.html" class="block p-2 hover:bg-white/10 rounded">Conquistas</a>
        </nav>
    </aside>
    <main class="flex-1 p-10">
        <h1 class="text-3xl font-bold text-[#2b1b12] mb-8">Seu Desempenho</h1>
        <div class="grid grid-cols-3 gap-6 mb-10">
            <div class="bg-white p-6 rounded-xl border border-[#efb883] shadow-sm">
                <div class="text-sm text-gray-500 uppercase font-bold">Média Geral</div>
                <div class="text-4xl font-black text-[#d2691e]">8.5</div>
            </div>
            <div class="bg-white p-6 rounded-xl border border-[#efb883] shadow-sm">
                <div class="text-sm text-gray-500 uppercase font-bold">Atividades</div>
                <div class="text-4xl font-black text-[#d2691e]">25/30</div>
            </div>
            <div class="bg-white p-6 rounded-xl border border-[#efb883] shadow-sm">
                <div class="text-sm text-gray-500 uppercase font-bold">Sequência</div>
                <div class="text-4xl font-black text-[#d2691e]">7 Dias</div>
            </div>
        </div>
        <!-- Gráfico simplificado mantendo a lógica de SVG do original -->
        <div class="bg-white p-8 rounded-xl border border-[#efb883]">
            <h3 class="font-bold mb-6">Atividade Semanal</h3>
            <div class="h-40 w-full bg-slate-50 relative border-l border-b border-gray-300">
                <svg class="w-full h-full" viewBox="0 0 500 100">
                    <polyline fill="none" stroke="#d2691e" stroke-width="3" points="0,80 80,60 160,70 240,30 320,40 400,20 500,10" />
                </svg>
            </div>
        </div>
    </main>
</div>
</body>
</html>
