<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <title>FRACTA - Conquistas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

</head>
<body class="bg-[#FBFBFA] text-[#2C1A11] min-h-screen antialiased">

    <header class="bg-white border-b border-gray-100 sticky top-0 z-50 shadow-sm backdrop-blur-md bg-white/90">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center gap-10">
                <a href="../index.html" class="flex items-center gap-3 group">
                    <div class="w-7 h-7 bg-[#C56E33] rounded-md"></div>
                    <span class="text-lg font-bold tracking-wider text-[#2C1A11]">FRACTA</span>
                </a>
                <nav class="hidden md:flex items-center gap-1.5 text-sm font-medium">
                    <a href="../index.html" class="px-4 py-2 text-gray-500 hover:text-[#2C1A11] hover:bg-gray-50 rounded-lg transition">Início</a>
                    <a href="progresso.html" class="px-4 py-2 text-gray-500 hover:text-[#2C1A11] hover:bg-gray-50 rounded-lg transition">Progresso</a>
                    <a href="conquistas.html" class="px-4 py-2 text-[#C56E33] bg-[#C56E33]/5 rounded-lg transition">Conquistas</a>
                    <a href="configuracao.html" class="px-4 py-2 text-gray-500 hover:text-[#2C1A11] hover:bg-gray-50 rounded-lg transition">Configuração</a>
                    <a href="ajuda.html" class="px-4 py-2 text-gray-500 hover:text-[#2C1A11] hover:bg-gray-50 rounded-lg transition">Ajuda</a>
                </nav>
            </div>
            <div class="flex items-center gap-4">
                <a href="conta.html" class="flex items-center gap-3 group">
                    <div id="avatarUsuario" class="w-9 h-9 rounded-xl bg-[#2C1A11] flex items-center justify-center text-white font-semibold text-sm">U</div>
                </a>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-10">
        <h1 class="text-3xl font-bold tracking-tight text-[#2C1A11] mb-2">Galeria de Medalhas</h1>
        <p class="text-gray-500 mb-8">Desbloqueie conquistas resolvendo problemas e completando módulos.</p>

        <div class="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-6 gap-6">
            <div class="bg-white p-6 rounded-2xl border-2 border-[#C56E33] shadow-sm flex flex-col items-center justify-center text-center">
                <div class="text-4xl mb-3">🥇</div>
                <span class="text-xs font-bold text-[#2C1A11]">Primeiros Passos</span>
            </div>
            <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm flex flex-col items-center justify-center text-center">
                <div class="text-4xl mb-3">🥈</div>
                <span class="text-xs font-bold text-[#2C1A11]">Mestre da Divisão</span>
            </div>
            <div class="bg-gray-50/50 p-6 rounded-2xl border border-gray-100 opacity-40 flex flex-col items-center justify-center text-center select-none">
                <div class="text-4xl mb-3 filter grayscale">🔒</div>
                <span class="text-xs font-medium text-gray-400">Em breve</span>
            </div>
            </div>

    <script src="../scripts/script.js"></script>
