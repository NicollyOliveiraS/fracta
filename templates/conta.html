<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRACTA - Perfil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>

<body class="bg-[#FBFBFA] text-[#2C1A11] min-h-screen antialiased">

    <header class="bg-white border-b border-gray-100 h-20 flex items-center justify-between px-6">

    <main class="max-w-4xl mx-auto px-6 py-12">

            <div class="w-24 h-24 rounded-2xl bg-[#2C1A11] text-white flex items-center justify-center text-3xl font-bold mb-4" id="avatarUsuario">U</div>
            <h2 class="text-2xl font-bold text-[#2C1A11]" id="nomeUsuario">Nome do Usuário</h2>
            <p class="text-xs text-gray-400 mt-1 uppercase font-semibold tracking-wider">Estudante Oficial</p>

        <h3 class="font-bold text-sm text-[#2C1A11] mb-4">Galeria de Troféus Adquiridos</h3>
        <div class="grid grid-cols-3 gap-4">
            <div class="bg-gray-50 border border-gray-100 rounded-xl h-32 flex items-center justify-center text-3xl opacity-50">🔒</div>
            <div class="bg-gray-50 border border-gray-100 rounded-xl h-32 flex items-center justify-center text-3xl opacity-50">🔒</div>
            <div class="bg-gray-50 border border-gray-100 rounded-xl h-32 flex items-center justify-center text-3xl opacity-50">🔒</div>
        </div>
    </main>

    <script src="../scripts/script.js"></script>

</html>
