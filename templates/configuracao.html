<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRACTA - Configurações</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-[#FBFBFA] text-[#2C1A11] min-h-screen antialiased">

    <header class="bg-white border-b border-gray-100 sticky top-0 z-50 shadow-sm backdrop-blur-md bg-white/90">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center gap-10">
                <a href="../index.html" class="flex items-center gap-3 group">
                    <div class="w-7 h-7 bg-[#C56E33] rounded-md"></div>
                    <span class="text-lg font-bold tracking-wider text-[#2C1A11]">FRACTA</span>
                </a>
                <nav class="hidden md:flex items-center gap-1.5 text-sm font-medium">
                    <a href="../index.html" class="px-4 py-2 text-gray-500 hover:text-[#2C1A11] hover:bg-gray-50 rounded-lg transition">Início</a>
                    <a href="progresso.html" class="px-4 py-2 text-gray-500 hover:text-[#2C1A11] hover:bg-gray-50 rounded-lg transition">Progresso</a>
                    <a href="conquistas.html" class="px-4 py-2 text-gray-500 hover:text-[#2C1A11] hover:bg-gray-50 rounded-lg transition">Conquistas</a>
                    <a href="configuracao.html" class="px-4 py-2 text-[#C56E33] bg-[#C56E33]/5 rounded-lg transition">Configuração</a>
                    <a href="ajuda.html" class="px-4 py-2 text-gray-500 hover:text-[#2C1A11] hover:bg-gray-50 rounded-lg transition">Ajuda</a>
                </nav>
            </div>
            <div class="flex items-center gap-4">
                <a href="conta.html" class="flex items-center gap-3 group">
                    <div id="avatarUsuario" class="w-9 h-9 rounded-xl bg-[#2C1A11] flex items-center justify-center text-white font-semibold text-sm">U</div>
                </a>
            </div>
        </div>
    </header>

    <main class="max-w-3xl mx-auto px-6 py-10">
        <h1 class="text-3xl font-bold tracking-tight text-[#2C1A11] mb-8">Configurações do Sistema</h1>

        <div class="space-y-4">
            <button class="w-full bg-white border border-gray-100 rounded-2xl p-5 flex items-center gap-5 hover:border-[#C56E33] hover:shadow-sm transition text-left">
                <div class="w-12 h-12 rounded-xl bg-[#C56E33]/10 flex items-center justify-center text-xl">🔒</div>
                <div>
                    <h2 class="font-bold text-[#2C1A11]">Privacidade e Segurança</h2>
                    <p class="text-xs text-gray-400">Gerencie a sua senha e as preferências de dados.</p>
                </div>
            </button>

            <button class="w-full bg-white border border-gray-100 rounded-2xl p-5 flex items-center gap-5 hover:border-[#C56E33] hover:shadow-sm transition text-left">
                <div class="w-12 h-12 rounded-xl bg-[#2C1A11]/5 flex items-center justify-center text-xl">ℹ</div>
                <div>
                    <h2 class="font-bold text-[#2C1A11]">Sobre o FRACTA</h2>
                    <p class="text-xs text-gray-400">Versão da aplicação e termos de licença jurídica.</p>
                </div>
            </button>
        </div>
    </main>

    <script src="../scripts/script.js"></script>
</body>
</html>
