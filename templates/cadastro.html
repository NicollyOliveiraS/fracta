<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FRACTA Cadastro</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="min-h-screen flex items-center justify-center bg-[url('../img/fundo.png')] bg-cover bg-center p-4">

  <div class="w-full max-w-6xl min-h-[700px] flex flex-col md:flex-row">

    <!-- Lado esquerdo -->
    <div class="w-full flex justify-center pt-28 md:pt-36">
      <div class="text-center">
        <h1 class="text-5xl text-black font-bold mb-4">
          Aprender é
        </h1>

        <h2 class="text-3xl text-orange-500 font-medium mb-2">
          descobrir o mundo
        </h2>

        <p class="text-black text-xl">
          Explore, imagine e descubra o poder das frações!
        </p>
      </div>
    </div>

    <!-- Formulário -->
    <div class="w-full flex items-center justify-center p-8">
      <div class="shadow-2xl backdrop-blur-sm rounded-2xl p-10 w-full max-w-md">
        
        <h1 class=" flex justify-center text-black text-5xl font-bold mb-8">
          Cadastro
        </h1>

        <form id="cadastroForm" class="space-y-5">

          <div>
            <label class="block text-black text-sm mb-1 font-medium">
              Nome Completo
            </label>

            <input
              id="cadNome"
              type="text"
              required
              class="w-full bg-transparent border-b-2 border-black/60 outline-none text-black pb-2 focus:border-black transition"
            >
          </div>

          <div>
            <label class="block text-black text-sm mb-1 font-medium">
              Nome de Usuário (Login)
            </label>

            <input
              id="cadUser"
              type="text"
              required
              class="w-full bg-transparent border-b-2 border-black/60 outline-none text-black pb-2 focus:border-black transition"
            >
          </div>

          <div>
            <label class="block text-black text-sm mb-1 font-medium">
              Senha
            </label>

            <input
              id="cadSenha"
              type="password"
              required
              class="w-full bg-transparent border-b-2 border-black/60 outline-none text-black pb-2 focus:border-black transition"
            >
          </div>

          <div>
            <label class="block text-black text-sm mb-1 font-medium">
              Confirmar senha
            </label>

            <input
              id="confirmarSenha"
              type="password"
              required
              class="w-full bg-transparent border-b-2 border-black/60 outline-none text-black pb-2 focus:border-black transition"
            >
          </div>

          <button
            type="submit"
            class="w-full bg-black text-white py-3 rounded-xl text-lg font-semibold hover:bg-neutral-900 hover:scale-[1.02] active:scale-[0.98] transition-all shadow-lg mt-6"
          >
            Cadastrar
          </button>

          <p class="text-black text-sm text-center pt-2">
            Já tem uma conta?
            <a
              href="login.html"
              class="text-orange-500 font-semibold hover:underline"
            >
              Faça login
            </a>
          </p>

        </form>
      </div>
    </div>

  </div>

  <script src="../scripts/script.js"></script>

</body>
</html>
