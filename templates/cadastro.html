<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FRACTA Cadastro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
  
</head>
<body class="min-h-screen flex items-center justify-center bg-gradient-to-b from-orange-500 to-orange-800 p-4">

  <div class="w-full max-w-5xl min-h-[520px] rounded-[35px] overflow-hidden shadow-2xl flex flex-col md:flex-row">

    <div class="w-full md:w-1/2 bg-[#f4f4f4] flex items-center justify-center p-8">
      <img src="../img/image.png" alt="Logo FRACTA" class="w-48 md:w-auto mx-auto object-contain">
    </div>

    <div class="w-full md:w-1/2 bg-gradient-to-b from-orange-500 to-orange-700 flex items-center justify-center p-8">
      <div class="w-full max-w-md">
        <h1 class="text-white text-5xl font-bold mb-6">Cadastro</h1>

        <form id="cadastroForm" class="space-y-4">
          <div>
            <label class="block text-white text-sm mb-1 font-medium">Nome Completo</label>
            <input id="cadNome" type="text" required class="w-full bg-transparent border-b-2 border-white/60 outline-none text-white pb-1 focus:border-white transition">
          </div>

          <div>
            <label class="block text-white text-sm mb-1 font-medium">Nome de Usuário (Login)</label>
            <input id="cadUser" type="text" required class="w-full bg-transparent border-b-2 border-white/60 outline-none text-white pb-1 focus:border-white transition">
          </div>

          <div>
            <label class="block text-white text-sm mb-1 font-medium">Senha</label>
            <input id="cadSenha" type="password" required class="w-full bg-transparent border-b-2 border-white/60 outline-none text-white pb-1 focus:border-white transition">
          </div>

          <div>
            <label class="block text-white text-sm mb-1 font-medium">Confirmar senha</label>
            <input id="confirmarSenha" type="password" required class="w-full bg-transparent border-b-2 border-white/60 outline-none text-white pb-1 focus:border-white transition">
          </div>

          <button type="submit" class="w-full bg-black text-white py-3 rounded-xl text-lg font-semibold hover:bg-neutral-900 hover:scale-[1.02] active:scale-[0.98] transition-all shadow-lg mt-4">
            Cadastrar
          </button>

          <p class="text-white text-sm text-center pt-2">
            Já tem uma conta? 
            <a href="login.html" class="text-orange-200 font-medium hover:underline">Faça login</a>
          </p>
        </form>
      </div>
    </div>

  </div>

  <script src="../scripts/script.js"></script>
</body>
</html>
