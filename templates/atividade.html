<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FRACTA - Atividade</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">

</head>
<body class="min-h-screen bg-gradient-to-b from-[#f8f4e8] via-[#f8f4e8] to-[#ffb07a] pb-12">

<header class="flex justify-between items-center px-10 py-4 bg-white/20">
    <div class="flex items-center gap-4">
        <h1 class="text-4xl font-bold tracking-widest text-[#5a2d16]">FRACTA</h1>
    </div>
    <a href="../index.html" class="bg-[#b8510e] text-white px-5 py-2 rounded-xl shadow-lg hover:bg-[#a1460b] transition font-medium">
         Voltar ao início
    </a>
</header>

<main class="max-w-3xl mx-auto flex flex-col items-center px-4">
    <h2 class="text-4xl font-bold italic text-[#2f221b] mt-6">Atividade Diagnóstica</h2>

    <div class="w-full max-w-xl h-3 bg-gray-300 rounded-full mt-4 mb-6 overflow-hidden shadow-inner">
        <div class="w-[75%] h-full bg-orange-500 rounded-full"></div>
    </div>

    <div class="bg-white border border-gray-200 rounded-[30px] p-8 shadow-xl w-full max-w-xl">
        
        <div class="flex justify-center mb-4">
            <svg width="180" height="180" viewBox="0 0 200 200" class="drop-shadow-md">
                <circle cx="100" cy="100" r="70" fill="white" stroke="#333" stroke-width="3"/>
                <path d="M100 100 L100 30 A70 70 0 0 1 149.5 50.5 Z" fill="#ff6d1f" stroke="#333" stroke-width="1.5"/>
                <path d="M100 100 L149.5 50.5 A70 70 0 0 1 170 100 Z" fill="#ff6d1f" stroke="#333" stroke-width="1.5"/>
                <path d="M100 100 L170 100 A70 70 0 0 1 149.5 149.5 Z" fill="#ff6d1f" stroke="#333" stroke-width="1.5"/>
                <path d="M100 100 L149.5 149.5 A70 70 0 0 1 100 170 Z" fill="#ff6d1f" stroke="#333" stroke-width="1.5"/>
                <path d="M100 100 L100 170 A70 70 0 0 1 50.5 149.5 Z" fill="#ff6d1f" stroke="#333" stroke-width="1.5"/>
                <path d="M100 100 L50.5 149.5 A70 70 0 0 1 30 100 Z" fill="#ff6d1f" stroke="#333" stroke-width="1.5"/>
                <path d="M100 100 L30 100 A70 70 0 0 1 50.5 50.5 Z" fill="#ff6d1f" stroke="#333" stroke-width="1.5"/>
                <path d="M100 100 L50.5 50.5 A70 70 0 0 1 100 30 Z" fill="white" stroke="#333" stroke-width="1.5"/>
            </svg>
        </div>

        <p class="text-center text-xl font-medium text-neutral-700 mb-6">
            Qual fração representa a parte pintada?
        </p>

        <div class="grid grid-cols-2 gap-4">
            <button class="opcao-atividade bg-[#f3f4f6] hover:bg-orange-100 border-2 border-transparent active:border-orange-500 rounded-2xl py-3 shadow transition flex flex-col items-center" data-valor="2/8">
                <span class="text-2xl font-bold">2</span>
                <span class="w-8 h-[2px] bg-neutral-600 block my-0.5"></span>
                <span class="text-2xl font-bold">8</span>
            </button>
            <button class="opcao-atividade bg-[#f3f4f6] hover:bg-orange-100 border-2 border-transparent active:border-orange-500 rounded-2xl py-3 shadow transition flex flex-col items-center" data-valor="2/6">
                <span class="text-2xl font-bold">2</span>
                <span class="w-8 h-[2px] bg-neutral-600 block my-0.5"></span>
                <span class="text-2xl font-bold">6</span>
            </button>
            <button class="opcao-atividade bg-[#f3f4f6] hover:bg-orange-100 border-2 border-transparent active:border-orange-500 rounded-2xl py-3 shadow transition flex flex-col items-center" data-valor="6/7">
                <span class="text-2xl font-bold">6</span>
                <span class="w-8 h-[2px] bg-neutral-600 block my-0.5"></span>
                <span class="text-2xl font-bold">7</span>
            </button>
            <button class="opcao-atividade bg-[#f3f4f6] hover:bg-orange-100 border-2 border-transparent active:border-orange-500 rounded-2xl py-3 shadow transition flex flex-col items-center" data-valor="7/8">
                <span class="text-2xl font-bold">7</span>
                <span class="w-8 h-[2px] bg-neutral-600 block my-0.5"></span>
                <span class="text-2xl font-bold">8</span>
            </button>
        </div>

        <div class="flex justify-between gap-4 mt-8 border-t pt-4">
            <a href="../index.html" class="w-1/2 bg-gray-200 text-center py-3 rounded-xl text-lg font-medium hover:bg-gray-300 transition">
                &lt; Voltar
            </a>
            <button id="btnProximo" class="w-1/2 bg-orange-500 py-3 rounded-xl text-lg font-bold text-white hover:bg-orange-500 transition shadow">
                Próximo &gt;
            </button>
        </div>

    </div>
</main>

<script src="../scripts/script.js"></script>
</body>
</html>
