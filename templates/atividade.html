<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>FRACTA - Atividade</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-[#f5f0df] min-h-screen">
<header class="bg-white/80 border-b border-[#efb883] px-10 py-4 flex justify-between items-center">
    <h1 class="text-2xl font-bold text-[#7c2f00]">FRACTA</h1>
    <a href="../index.html" class="text-sm font-medium text-[#7c2f00] hover:underline">Sair da Atividade</a>
</header>
<main class="max-w-2xl mx-auto py-12 px-4">
    <div class="bg-white border border-[#efb883] rounded-xl p-8 shadow-sm">
        <div class="mb-8">
            <div class="text-xs font-bold text-[#d2691e] uppercase tracking-wider mb-2">Questão 01</div>
            <h2 class="text-xl font-bold text-[#2b1b12]">Identifique a fração correspondente à área pintada:</h2>
        </div>
        <div class="flex justify-center mb-10">
            <!-- SVG do círculo original mantido -->
            <svg width="160" height="160" viewBox="0 0 200 200">
                <circle cx="100" cy="100" r="70" fill="white" stroke="#333" stroke-width="2"/>
                <path d="M100 100 L100 30 A70 70 0 0 1 149.5 50.5 Z" fill="#d2691e" stroke="#333"/>
                <path d="M100 100 L149.5 50.5 A70 70 0 0 1 170 100 Z" fill="#d2691e" stroke="#333"/>
                <path d="M100 100 L170 100 A70 70 0 0 1 149.5 149.5 Z" fill="#d2691e" stroke="#333"/>
                <path d="M100 100 L149.5 149.5 A70 70 0 0 1 100 170 Z" fill="#d2691e" stroke="#333"/>
                <path d="M100 100 L100 170 A70 70 0 0 1 50.5 149.5 Z" fill="#d2691e" stroke="#333"/>
                <path d="M100 100 L50.5 149.5 A70 70 0 0 1 30 100 Z" fill="#d2691e" stroke="#333"/>
                <path d="M100 100 L30 100 A70 70 0 0 1 50.5 50.5 Z" fill="#d2691e" stroke="#333"/>
                <path d="M100 100 L50.5 50.5 A70 70 0 0 1 100 30 Z" fill="white" stroke="#333"/>
            </svg>
        </div>
        <div class="grid grid-cols-2 gap-4 mb-8">
            <button class="opcao-atividade border-2 border-[#efb883] p-4 rounded-lg font-bold hover:bg-[#efb883]" data-valor="2/8">2/8</button>
            <button class="opcao-atividade border-2 border-[#efb883] p-4 rounded-lg font-bold hover:bg-[#efb883]" data-valor="2/6">2/6</button>
            <button class="opcao-atividade border-2 border-[#efb883] p-4 rounded-lg font-bold hover:bg-[#efb883]" data-valor="6/7">6/7</button>
            <button class="opcao-atividade border-2 border-[#efb883] p-4 rounded-lg font-bold hover:bg-[#efb883]" data-valor="7/8">7/8</button>
        </div>
        <button id="btnProximo" class="w-full bg-[#7c2f00] text-white py-3 rounded-lg font-bold">Verificar Resposta</button>
    </div>
</main>
<script src="../scripts/script.js"></script>
</body>
</html>
