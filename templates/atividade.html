<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRACTA - Atividade</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-[#FBFBFA] text-[#2C1A11] min-h-screen antialiased flex flex-col justify-between">

    <header class="bg-white border-b border-gray-100 h-20 flex justify-between items-center px-6">
        <span class="text-lg font-bold tracking-wider text-[#2C1A11]">FRACTA</span>
        <a href="../index.html" class="text-sm font-medium text-red-500 hover:bg-red-50 px-3 py-1.5 rounded-lg transition">Abandonar Módulo</a>
    </header>

    <main class="max-w-2xl mx-auto py-12 px-6 w-full flex-1">
        <div class="bg-white border border-gray-100 rounded-2xl p-8 shadow-sm">
            <div class="text-xs font-bold text-[#C56E33] uppercase tracking-wider mb-2">Questão Atual</div>
            <h2 class="text-xl font-bold text-[#2C1A11] mb-6">Analise a representação geométrica abaixo:</h2>

            <div class="flex justify-center bg-gray-50 p-6 rounded-2xl border border-gray-100 mb-8">
                <svg width="150" height="150" viewBox="0 0 200 200" class="drop-shadow-sm">
                    <circle cx="100" cy="100" r="80" fill="none" stroke="#2C1A11" stroke-width="3"/>
                    <path d="M100 100 L170 100 A70 70 0 0 1 149.5 149.5 Z" fill="#C56E33"/>
                    </svg>
            </div>

            <p class="text-gray-500 text-sm mb-6">Selecione a opção de fração que condiz com a área colorida:</p>
            <div class="grid grid-cols-2 gap-4">
                <button class="p-4 border border-gray-200 rounded-xl font-semibold text-sm hover:border-[#C56E33] hover:bg-[#C56E33]/5 transition">5/6</button>
                <button class="p-4 border border-gray-200 rounded-xl font-semibold text-sm hover:border-[#C56E33] hover:bg-[#C56E33]/5 transition">1/6</button>
            </div>
        </div>
    </main>

    <script src="../scripts/script.js"></script>
</body>
</html>
