<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Definition of gradients and shadows -->
  <defs>
    <radialGradient id="silver" cx="50%" cy="50%" r="50%" fx="30%" fy="30%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="60%" stop-color="#E2E8F0" />
      <stop offset="100%" stop-color="#A0AEC0" />
    </radialGradient>
    <linearGradient id="ribbonGreen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2F855A" />
      <stop offset="50%" stop-color="#48BB78" />
      <stop offset="100%" stop-color="#2F855A" />
    </linearGradient>
    <linearGradient id="ribbonPurple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#553C9A" />
      <stop offset="50%" stop-color="#805AD5" />
      <stop offset="100%" stop-color="#553C9A" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="2" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Ribbons behind the medal -->
  <g filter="url(#shadow)">
    <!-- Purple Ribbon Left -->
    <path d="M 38 40 L 25 85 L 38 80 L 50 85 Z" fill="url(#ribbonPurple)" />
    <!-- Green Ribbon Right -->
    <path d="M 62 40 L 75 85 L 62 80 L 50 85 Z" fill="url(#ribbonGreen)" />
  </g>

  <!-- Medal Base Circle -->
  <circle cx="50" cy="45" r="30" fill="url(#silver)" filter="url(#shadow)" stroke="#4A5568" stroke-width="2" />
  
  <!-- Outer Ring Detail -->
  <circle cx="50" cy="45" r="26" fill="none" stroke="#FFF" stroke-width="1.5" stroke-dasharray="4,2" opacity="0.8" />
  
  <!-- Inner Ring -->
  <circle cx="50" cy="45" r="22" fill="none" stroke="#4A5568" stroke-width="1" opacity="0.5" />

  <!-- Fraction "1/2" Text/Symbol in Center -->
  <g transform="translate(0, 3)" filter="url(#shadow)">
    <!-- Numerator: 1 -->
    <text x="50" y="32" font-family="'Fredoka', sans-serif" font-size="14" font-weight="700" fill="#2D3748" text-anchor="middle">1</text>
    <!-- Fraction Bar -->
    <line x1="42" y1="38" x2="58" y2="38" stroke="#2D3748" stroke-width="3" stroke-linecap="round" />
    <!-- Denominator: 2 -->
    <text x="50" y="54" font-family="'Fredoka', sans-serif" font-size="14" font-weight="700" fill="#2D3748" text-anchor="middle">2</text>
  </g>
  
  <!-- Ribbon Holder Link -->
  <rect x="44" y="10" width="12" height="6" rx="2" fill="#4A5568" />
</svg>
