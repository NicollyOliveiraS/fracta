<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FRACTA Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">

</head>
<body class="bg-[#f5f0df] min-h-screen">

<div class="flex h-screen overflow-hidden">

    <aside class="w-64 bg-gradient-to-b from-[#7c2f00] to-[#3d1300] text-white flex flex-col justify-between">
        <nav class="mt-10 px-4 space-y-2">
            <a href="index.html" class="flex items-center gap-3 bg-[#d2691e] px-4 py-3 rounded-lg font-medium">
                 <span>Início</span>
            </a>
            <a href="templates/progresso.html" class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-white/10 transition">
                <span>Progresso</span>
            </a>
            <a href="templates/conquistas.html" class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-white/10 transition">
                 <span>Conquistas</span>
            </a>
            <a href="templates/configuracao.html" class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-white/10 transition">
                <span>Configuração</span>
            </a>
            <a href="templates/ajuda.html" class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-white/10 transition">
                 <span>Ajuda</span>
            </a>
        </nav>
        
        <div class="p-4">
            <a href="templates/login.html" class="btnSair w-full flex items-center gap-3 px-4 py-3 rounded-lg bg-red-900/40 hover:bg-red-700 transition text-left">
                ↩ <span>Sair</span>
            </a>
        </div>
    </aside>

    <main class="flex-1 overflow-y-auto">
        <header class="flex items-center justify-between px-8 py-4 bg-white/40 backdrop-blur-sm sticky top-0 z-10">
            <div class="flex items-center gap-3">
             <img src="img/image (1).png" alt="Logo" class="w-14 h-14 object-contain">
            </div>
            <div class="flex items-center gap-6">
                <button class="text-2xl hover:scale-110 transition">🔔</button>
              <a href="templates/conta.html">  <div id="avatarUsuario" class="w-12 h-12 rounded-full bg-orange-600 flex items-center justify-center text-white font-bold shadow">U</div></a>
            </div>
        </header>

        <div class="px-6 py-6 space-y-6">
            <section class="bg-[#efb883] rounded-2xl p-8 shadow-sm">
                <h2 class="text-4xl italic font-bold text-[#2b1b12] mb-1">
                    Olá, <span id="nomeUsuario">Usuário</span>!
                </h2>
                <p class="text-xl text-[#4a2c1c] mb-5">
                    Vamos continuar aprendendo sobre frações?
                </p>
                <a href="templates/atividade.html" class="w-fit bg-orange-600 hover:bg-orange-700 text-white px-6 py-3 rounded-xl flex items-center gap-3 font-medium shadow transition-all transform hover:-translate-y-0.5">
                    ▶ Continuar atividade
                </a>
            </section>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="bg-[#efb883] rounded-2xl p-6 shadow-sm flex flex-col justify-between">
                    <div>
                        <h3 class="text-3xl font-bold italic text-[#2b1b12] mb-4">Atividades</h3>
                        <div class="space-y-3">
                            <a href="templates/atividade.html" class="block w-full bg-[#f7e6cf] hover:bg-[#faeedd] p-4 text-left rounded-xl font-medium transition">
                                ▶ Atividade Diagnóstica
                            </a>
                            <button disabled class="w-full bg-[#e7d4bf] p-4 text-left rounded-xl opacity-60 flex justify-between items-center cursor-not-allowed">
                                <span>Soma de frações</span> 🔒
                            </button>
                        </div>
                    </div>
                    <button class="mt-5 bg-orange-600 text-white text-sm px-4 py-2 rounded-lg font-medium hover:bg-orange-700 transition">
                        Ver todas as atividades
                    </button>
                </div>

                <div class="bg-[#efb883] rounded-2xl p-6 lg:col-span-2 shadow-sm">
                    <h3 class="text-4xl font-bold italic text-[#2b1b12] mb-2">Desafio do dia</h3>
                    <p class="text-2xl text-[#4a2c1c] mb-6">Qual é a fração equivalente a 2/4?</p>

                    <div class="flex flex-wrap gap-4">
                        <button data-valor="1/2" class="opcao-fracao bg-[#f7f0e4] hover:bg-white w-20 h-20 rounded-xl text-2xl font-bold shadow-sm transition-all border-4 border-transparent">1/2</button>
                        <button data-valor="3/6" class="opcao-fracao bg-[#f7f0e4] hover:bg-white w-20 h-20 rounded-xl text-2xl font-bold shadow-sm transition-all border-4 border-transparent">3/6</button>
                        <button data-valor="2/3" class="opcao-fracao bg-[#f7f0e4] hover:bg-white w-20 h-20 rounded-xl text-2xl font-bold shadow-sm transition-all border-4 border-transparent">2/3</button>
                        <button data-valor="4/8" class="opcao-fracao bg-[#f7f0e4] hover:bg-white w-20 h-20 rounded-xl text-2xl font-bold shadow-sm transition-all border-4 border-transparent">4/8</button>
                    </div>

                    <button id="btnResponder" class="mt-6 bg-black text-white px-10 py-3 rounded-xl font-semibold shadow hover:bg-neutral-900 transition-all active:scale-95">
                        Responder
                    </button>
                </div>
            </div>
            
            <section class="bg-[#efb883]/50 border-2 border-dashed border-[#efb883] rounded-3xl h-32 flex items-center justify-center text-stone-600 italic">
                Espaço para novidades e atualizações futuras
            </section>
        </div>
    </main>

</div>
<script src="scripts/script.js"></script>
</body>
</html>
